# ==============================================================================
# Role: swarm-manager - สั่งให้ node นี้เป็น Swarm Manager
# ==============================================================================

- name: Check if Swarm is already initialized
  command: docker info --format '{{ "{{" }} .Swarm.LocalNodeState {{ "}}" }}'
  register: swarm_status
  changed_when: false

- name: Initialize Docker Swarm
  command: >
    docker swarm init
    --advertise-addr {{ ansible_default_ipv4.address }}
  when: swarm_status.stdout != "active"

- name: Get worker join token
  command: docker swarm join-token worker -q
  register: worker_token
  changed_when: false

- name: Save worker token as fact (ส่งต่อให้ worker role ใช้)
  set_fact:
    swarm_worker_token: "{{ worker_token.stdout }}"
    swarm_manager_ip: "{{ ansible_default_ipv4.address }}"

- name: Create overlay network for Traefik
  command: >
    docker network create
    --driver overlay
    --attachable
    traefik-public
  register: network_result
  changed_when: network_result.rc == 0
  failed_when: network_result.rc != 0 and 'already exists' not in network_result.stderr
